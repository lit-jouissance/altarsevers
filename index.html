<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">

<style>
:root{
  --ink:#241a1d;
  --parchment:#f6f1e6;
  --burgundy:#6d1f2b;
  --burgundy-deep:#4c151e;
  --gold:#b6893c;
  --line:#e3d9c2;
  --shadow: 0 2px 10px rgba(60,40,20,0.08);
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-t: env(safe-area-inset-top, 0px);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; overscroll-behavior-y:none;}
body{
  font-family:'Noto Sans KR', sans-serif;
  background:var(--parchment);
  color:var(--ink);
  min-height:100vh;
}
h1,h2,h3,.serif{font-family:'Noto Serif KR', serif;}
#app{max-width:520px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column;}

/* ---------- top bar ---------- */
header.top{
  padding:calc(12px + var(--safe-t)) 16px 12px;
  background:#fff; border-bottom:1px solid var(--line);
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:40;
}
header.top .titles{line-height:1.3;}
header.top .title{font-size:1.05rem; font-weight:700; font-family:'Noto Serif KR';}
header.top .subtitle{font-size:0.72rem; color:#9c8b74;}
#adminBtn{
  border:1px solid var(--line); background:#fdfbf6; color:#7a6a52;
  padding:6px 10px; border-radius:20px; font-size:0.72rem; cursor:pointer;
  display:flex; align-items:center; gap:4px; white-space:nowrap;
}
#adminBtn.on{background:var(--burgundy); color:#fff; border-color:var(--burgundy);}

main{flex:1; padding-bottom:calc(78px + var(--safe-b));}
section.panel{padding:16px 16px 6px; animation:fade .2s ease;}
@keyframes fade{from{opacity:0} to{opacity:1}}

/* ---------- bottom nav ---------- */
nav.bottomnav{
  position:fixed; left:0; right:0; bottom:0; z-index:50;
  max-width:520px; margin:0 auto;
  display:flex; background:#fff; border-top:1px solid var(--line);
  padding-bottom:var(--safe-b);
  box-shadow:0 -2px 12px rgba(60,40,20,0.06);
}
nav.bottomnav button{
  flex:1; border:none; background:transparent; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:9px 2px 8px; color:#a89777; font-size:0.62rem; font-weight:500;
}
nav.bottomnav button .icon{font-size:1.15rem; line-height:1;}
nav.bottomnav button.active{color:var(--burgundy);}

/* ---------- home hero ---------- */
.home-hero{
  min-height:calc(100vh - 66px - 78px - var(--safe-t) - var(--safe-b));
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; color:#fff; padding:36px 26px; border-radius:0;
  transition:background-color .5s ease;
}
.home-hero .date{font-size:0.82rem; opacity:0.85; letter-spacing:1.5px;}
.home-hero .liturgy-name{font-family:'Noto Serif KR'; font-weight:700; font-size:1.35rem; margin:14px 0 6px; line-height:1.4;}
.home-hero .colorchip{font-size:0.72rem; padding:3px 12px; border-radius:20px; background:rgba(255,255,255,0.2); display:inline-block; margin-top:2px;}
.home-hero .verse{font-family:'Noto Serif KR'; font-size:1.05rem; line-height:1.85; margin-top:26px; padding-top:22px; border-top:1px solid rgba(255,255,255,0.32); max-width:340px;}
.home-hero .ref{display:block; font-size:0.78rem; opacity:0.82; margin-top:8px;}
.home-hero .servers-today{margin-top:22px; font-size:0.85rem; background:rgba(255,255,255,0.15); padding:8px 16px; border-radius:12px;}
.home-hero .note{margin-top:16px; font-size:0.68rem; opacity:0.7;}
.home-below{padding:16px 16px 0;}

/* ---------- cards / forms ---------- */
.card{background:#fff; border:1px solid var(--line); border-radius:14px; padding:16px 18px; margin-bottom:14px; box-shadow:var(--shadow);}
.card h3{margin:0 0 12px; font-size:1rem; border-bottom:2px solid var(--gold); padding-bottom:8px; display:inline-block;}
label{display:block; font-size:0.78rem; color:#8a7256; margin:10px 0 4px; font-weight:500;}
input,select,textarea{width:100%; padding:10px 11px; border:1px solid var(--line); border-radius:8px; font-family:'Noto Sans KR'; font-size:0.95rem; background:#fffdf9;}
input[readonly],textarea[readonly]{background:#f4f0e6; color:#6a5c48;}
textarea{resize:vertical; min-height:70px;}
button.btn{background:var(--burgundy); color:#fff; border:none; padding:11px 18px; border-radius:8px; font-size:0.9rem; cursor:pointer; font-weight:500; margin-top:10px;}
button.btn.secondary{background:transparent; color:var(--burgundy); border:1px solid var(--burgundy);}
button.btn.danger{background:transparent; color:#a13; border:1px solid #a13;}
button.btn.small{padding:7px 12px; font-size:0.78rem; margin:0;}
button.btn.wide{width:100%;}
button:disabled{opacity:0.45; cursor:not-allowed;}
.row{display:flex; gap:8px; flex-wrap:wrap;}
.row > *{flex:1; min-width:120px;}

table{width:100%; border-collapse:collapse; font-size:0.85rem;}
th,td{padding:8px 5px; border-bottom:1px solid var(--line); text-align:left; vertical-align:top;}
th{color:#8a7256; font-weight:600; font-size:0.72rem;}
tr:last-child td{border-bottom:none;}
.actions-row{display:flex; gap:6px; flex-wrap:wrap;}
.empty{text-align:center; color:#a99; padding:24px 10px; font-size:0.88rem;}
.muted{color:#998; font-size:0.78rem;}
.month-grid{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:14px;}
.month-grid button{padding:10px 4px; border-radius:8px; border:1px solid var(--line); background:#fff; cursor:pointer; font-size:0.85rem;}
.month-grid button.active{background:var(--burgundy); color:#fff; border-color:var(--burgundy);}
.month-grid button.has-data::after{content:"●"; display:block; font-size:0.5rem; color:var(--gold); margin-top:2px;}
.tag-color{width:10px; height:10px; border-radius:50%; display:inline-block; margin-right:5px;}

/* ---------- 일정표 달력 ---------- */
.cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:5px; margin-top:14px;}
.cal-dow{text-align:center; font-size:0.7rem; color:#a89777; padding:2px 0 6px; font-weight:600;}
.cal-cell{
  min-height:60px; background:#fdfbf6; border:1px solid var(--line); border-radius:8px;
  padding:4px 5px; font-size:0.64rem; cursor:pointer; overflow:hidden; transition:box-shadow .1s;
}
.cal-cell:active{box-shadow:inset 0 0 0 2px var(--gold);}
.cal-cell.empty{background:transparent; border:none; cursor:default;}
.cal-cell.today{background:#fff8ea; border-color:var(--gold);}
.cal-daynum{font-weight:700; font-size:0.72rem; color:#5a4a36;}
.cal-name{color:#6a5c48; margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.cal-people{color:var(--burgundy); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; font-weight:500;}
.cal-legend{display:flex; flex-wrap:wrap; gap:9px; margin-top:14px; font-size:0.7rem; color:#8a7256;}
.legend-item{display:flex; align-items:center; gap:4px;}
.gate{text-align:center; padding:30px 16px; color:#8a7256;}
.gate .lock{font-size:2rem; margin-bottom:10px;}

dialog#modal{border:none; border-radius:16px; padding:0; max-width:440px; width:90%; box-shadow:0 10px 40px rgba(0,0,0,0.25);}
dialog#modal::backdrop{background:rgba(30,20,15,0.45);}
.modal-inner{padding:20px 22px; max-height:82vh; overflow-y:auto;}
.modal-inner h3{margin-top:0;}
.close-x{float:right; cursor:pointer; font-size:1.1rem; color:#998;}
.syncbadge{font-size:0.68rem; padding:2px 0; color:#a89777;}
.spin{display:inline-block; width:12px; height:12px; border:2px solid rgba(0,0,0,0.15); border-top-color:var(--burgundy); border-radius:50%; animation:sp .7s linear infinite; vertical-align:middle; margin-right:6px;}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

  <header class="top">
    <div class="titles">

<script>
/* ============================================================
   Firebase 설정 — 다른 프로젝트들과 동일한 방식입니다.
   Firebase 콘솔 > 프로젝트 설정 > 일반 > 내 앱 에서 값을 복사해 붙여넣으세요.
   설정 전까지는 브라우저 localStorage로 동작합니다(이 기기에만 저장).
   ============================================================ */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

let db = null;
let useFirebase = false;
try {
  if (firebaseConfig.apiKey !== "YOUR_API_KEY") {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    useFirebase = true;
  }
} catch(e) { console.warn("Firebase init 실패, localStorage로 동작합니다.", e); }

const LS_PREFIX = "boksadan_";

// Firestore 요청이 응답 없이 멈추는 것을 방지 (예: Firestore DB 미생성, 네트워크 차단 등)
function withTimeout(promise, ms = 8000) {
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error('연결 시간 초과 — Firebase/Firestore 설정을 확인해주세요.')), ms))
  ]);
}

async function dbGet(path, fallbackDefault) {
  if (useFirebase) {
    try { const snap = await withTimeout(db.doc(path).get()); return snap.exists ? snap.data() : fallbackDefault; }
    catch(e){ console.error(e); alert('데이터를 불러오지 못했습니다: ' + e.message + '\n(Firestore 데이터베이스가 생성되어 있는지, 규칙이 열려있는지 확인해주세요)'); return fallbackDefault; }
  } else {
    const raw = localStorage.getItem(LS_PREFIX + path);
    return raw ? JSON.parse(raw) : fallbackDefault;
  }
}
async function dbDelete(path) {
  if (useFirebase) { try { await withTimeout(db.doc(path).delete()); } catch(e){ console.error(e); alert('삭제 중 오류: ' + e.message); } }
  else { localStorage.removeItem(LS_PREFIX + path); }
}
async function dbSet(path, data) {
  if (useFirebase) {
    try { await withTimeout(db.doc(path).set(data, {merge:true})); }
    catch(e){ console.error(e); alert("저장 중 오류: " + e.message + '\n(Firestore 데이터베이스가 생성되어 있는지, 규칙이 열려있는지 확인해주세요)'); }
  } else {
    localStorage.setItem(LS_PREFIX + path, JSON.stringify(data));
  }
}
async function collGetAll(collPath) {
  if (useFirebase) {
    try { const snap = await withTimeout(db.collection(collPath).get()); const arr=[]; snap.forEach(d=>arr.push({id:d.id, ...d.data()})); return arr; }
    catch(e){ console.error(e); alert('데이터를 불러오지 못했습니다: ' + e.message); return []; }
  } else {
    const raw = localStorage.getItem(LS_PREFIX + "coll_" + collPath);
    return raw ? JSON.parse(raw) : [];
  }
}
async function collSetAll(collPath, arr) {
  if (useFirebase) {
    try {
      const batch = db.batch();
      const existing = await withTimeout(db.collection(collPath).get());
      existing.forEach(d => batch.delete(d.ref));
      arr.forEach(item => { const {id, ...rest} = item; const ref = id ? db.collection(collPath).doc(id) : db.collection(collPath).doc(); batch.set(ref, rest); });
      await withTimeout(batch.commit());
    } catch(e){ console.error(e); alert("저장 중 오류: " + e.message + '\n(Firestore 데이터베이스가 생성되어 있는지, 규칙이 열려있는지 확인해주세요)'); }
  } else {
    localStorage.setItem(LS_PREFIX + "coll_" + collPath, JSON.stringify(arr));
  }
}

/* ---------- 관리자 인증 ---------- */
function isAdmin(){ return sessionStorage.getItem('isAdmin') === '1'; }
function setAdmin(on){ if(on) sessionStorage.setItem('isAdmin','1'); else sessionStorage.removeItem('isAdmin'); updateAdminBtn(); }
async function updateAdminBtn(){
  const btn = document.getElementById('adminBtn');
  if (isAdmin()) {
    const cfg = await dbGet('config/main', {});
    btn.textContent = `🔓 ${cfg.adminName ? cfg.adminName+' · ' : ''}로그아웃`;
    btn.classList.add('on');
  } else {
    btn.textContent = '🔒 관리자';
    btn.classList.remove('on');
  }
}
document.getElementById('adminBtn').addEventListener('click', async () => {
  if (isAdmin()) {
    if (confirm('관리자 모드를 종료할까요?')) { setAdmin(false); render(currentTab); }
    return;
  }
  const cfg = await dbGet('config/main', {});
  if (!cfg.adminPin) {
    openModal(`
      <span class="close-x" onclick="closeModal()">✕</span>
      <h3>관리자 PIN 최초 설정</h3>
      <p class="muted">아직 관리자 PIN이 설정되지 않았습니다. 복사단원 중 관리자 1명을 정하고 PIN을 만들어주세요.</p>
      <label>관리자 이름</label>
      <input id="firstAdminName" placeholder="예: 문은주 요한보스코">
      <label>PIN (숫자/문자 자유, 4자 이상 권장)</label>
      <input id="firstAdminPin" type="password">
      <button class="btn" id="firstAdminSaveBtn">설정하고 로그인</button>
    `);
    document.getElementById('firstAdminSaveBtn').onclick = async () => {
      const name = document.getElementById('firstAdminName').value.trim();
      const pin = document.getElementById('firstAdminPin').value.trim();
      if (!name || !pin) { alert('이름과 PIN을 모두 입력해주세요.'); return; }
      await dbSet('config/main', {...cfg, adminName:name, adminPin:pin});
      setAdmin(true);
      closeModal();
      render(currentTab);
    };
  } else {
    openModal(`
      <span class="close-x" onclick="closeModal()">✕</span>
      <h3>관리자 로그인</h3>
      <label>PIN</label>
      <input id="loginPin" type="password" autofocus>
      <button class="btn" id="loginBtn">로그인</button>
    `);
    document.getElementById('loginBtn').onclick = async () => {
      const pin = document.getElementById('loginPin').value;
      const cfg2 = await dbGet('config/main', {});
      if (pin && pin === cfg2.adminPin) { setAdmin(true); closeModal(); render(currentTab); }
      else alert('PIN이 올바르지 않습니다.');
    };
  }
});

function gateHtml(msg){
  return `<div class="gate"><div class="lock">🔒</div><p>${msg || '관리자만 수정할 수 있습니다.'}</p>
  <button class="btn secondary" onclick="document.getElementById('adminBtn').click()">관리자 로그인</button></div>`;
}

/* ---------- 공통 유틸 ---------- */
const DIOCESES = ["의정부교구","부산교구","광주대교구","마산교구","인천교구","춘천교구","전주교구",
  "원주교구","청주교구","대구대교구","대전교구","군종교구","수원교구","서울대교구","제주교구","안동교구"];

// 매일미사(missa.cbck.or.kr) 표기 기준 전례색 코드
const LITURGICAL_COLORS = {
  "녹":{label:"연중 시기 (녹색)", hex:"#3f5b3f"},
  "백":{label:"축일/대축일 (백색)", hex:"#a68a4a"},
  "홍":{label:"순교자·성령 (홍색)", hex:"#8b1e3f"},
  "자":{label:"대림·사순 (자색)", hex:"#4b2e5c"},
  "장":{label:"자우데테·래타레 (장미색)", hex:"#c98a94"},
  "흑":{label:"위령 (흑색)", hex:"#2a2a2a"}
};
const WEEKDAY_KR = ["일","월","화","수","목","금","토"];

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function escapeHtml(s){ return (s||"").toString().replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function openModal(html){ document.getElementById('modalBody').innerHTML = html; document.getElementById('modal').showModal(); }
function closeModal(){ document.getElementById('modal').close(); }
function ymd(dateObj){ const y=dateObj.getFullYear(); const m=String(dateObj.getMonth()+1).padStart(2,'0'); const d=String(dateObj.getDate()).padStart(2,'0'); return `${y}${m}${d}`; }

/* ---------- 푸시 알림 (그날 배정된 복사에게만, 오전 7시경 자동 발송) ---------- */
// 공개 VAPID 키 — 공개해도 안전한 값입니다(비밀키는 서버 환경변수에만 저장).
const VAPID_PUBLIC_KEY = "BL3WJ3h0EGrKYZAVSzgZ-xpB_zxD3BfXbS51TqZuj_Eb2hW-Yw_ASIe8JKItIjYbbGEoheK3oKtW-NBgMHj_JGA";
function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
}
let swRegistration = null;
async function registerSW(){
  if (!('serviceWorker' in navigator)) return null;
  try { swRegistration = await navigator.serviceWorker.register('/sw.js'); return swRegistration; }
  catch(e){ console.warn('서비스 워커 등록 실패', e); return null; }
}
async function getCurrentPushSub(){
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return null;
  const reg = await navigator.serviceWorker.ready.catch(()=>null);
  if (!reg) return null;
  return await reg.pushManager.getSubscription();
}
async function subscribeForPush(name){
  if (!name) { alert('이름을 먼저 선택해주세요.'); return; }
  if (!useFirebase) { alert('알림 기능은 Firebase 연동 후에만 사용할 수 있습니다. (설정 탭 참고)'); return; }
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
    alert('이 브라우저는 푸시 알림을 지원하지 않습니다. iOS는 홈 화면에 앱을 추가한 뒤 그 아이콘으로 열어서 다시 시도해주세요.');
    return;
  }
  const perm = await Notification.requestPermission();
  if (perm !== 'granted') { alert('알림 권한이 허용되지 않았습니다. 브라우저 설정에서 알림을 허용해주세요.'); return; }
  const reg = await navigator.serviceWorker.ready;
  let sub = await reg.pushManager.getSubscription();
  if (!sub) {
    sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY) });
  }
  await dbSet(`pushSubscriptions/${name}`, {...sub.toJSON(), name});
  localStorage.setItem('myMemberName', name);
  renderHome();
}
async function unsubscribeFromPush(name){
  const sub = await getCurrentPushSub();
  if (sub) await sub.unsubscribe().catch(()=>{});
  if (name) await dbDelete(`pushSubscriptions/${name}`);
  renderHome();
}

/* ---------- 전례력 자동조회 (missa.cbck.or.kr 연동 API) ---------- */
async function fetchLiturgyForDate(dateObj){
  try {
    const r = await fetch(`/api/liturgy?date=${ymd(dateObj)}`);
    if (!r.ok) throw new Error('status '+r.status);
    return await r.json(); // {date, color, name, raw}
  } catch(e) {
    console.warn('전례력 조회 실패(로컬 미리보기이거나 Vercel 배포 전일 수 있습니다):', e);
    return null;
  }
}

async function importMembersFile(e){
  const file = e.target.files[0];
  if (!file) return;
  const statusEl = document.getElementById('memberImportStatus');
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, {type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
    if (!rows.length) { alert('파일에서 데이터를 찾을 수 없습니다. 샘플 양식을 참고해주세요.'); return; }
    const members = await collGetAll('members');
    let added=0, updated=0;
    rows.forEach(r => {
      const name = String(r['이름']||'').trim();
      if (!name) return;
      const idx = members.findIndex(m=>m.name===name);
      const rec = { id: idx>=0 ? members[idx].id : uid(), name,
        feast: String(r['축일']||'').trim(), contact: String(r['연락처']||'').trim(), role: String(r['직책']||'').trim() };
      if (idx>=0) { members[idx]=rec; updated++; } else { members.push(rec); added++; }
    });
    await collSetAll('members', members);
    if (statusEl) statusEl.textContent = `완료: ${added}명 추가, ${updated}명 갱신`;
  } catch(err) {
    alert('파일을 읽는 중 오류가 발생했습니다: ' + err.message);
  } finally {
    e.target.value = '';
    renderMembers();
  }
}

let scheduleSelectedYear = new Date().getFullYear();
let scheduleSelectedMonth = new Date().getMonth() + 1;
async function renderSchedule(){
  const el = document.getElementById('panel-schedule');
  const admin = isAdmin();
  const year = scheduleSelectedYear, month = scheduleSelectedMonth;
  const allSched = await collGetAll('schedule');
  const sched = allSched.filter(s => String(s.year)===String(year) && Number(s.month)===Number(month));
  const monthNames = ["1월","2월","3월","4월","5월","6월","7월","8월","9월","10월","11월","12월"];

  const firstDow = new Date(year, month-1, 1).getDay();
  const daysInMonth = new Date(year, month, 0).getDate();
  const cells = [];
  for (let i=0;i<firstDow;i++) cells.push(null);
  for (let d=1; d<=daysInMonth; d++) cells.push(d);

  const calHtml = `
    <div class="cal-grid">
      ${WEEKDAY_KR.map(w=>`<div class="cal-dow">${w}</div>`).join('')}
      ${cells.map(d => {
        if (d===null) return `<div class="cal-cell empty"></div>`;
        const entry = sched.find(s=>Number(s.day)===d);
        const colorHex = entry && entry.color && LITURGICAL_COLORS[entry.color] ? LITURGICAL_COLORS[entry.color].hex : null;
        const today = new Date();
        const isToday = today.getFullYear()===year && (today.getMonth()+1)===month && today.getDate()===d;
        return `<div class="cal-cell${isToday?' today':''}" style="${colorHex?`border-top:4px solid ${colorHex}`:''}" onclick="openDayDetail(${d})">
          <div class="cal-daynum">${d}</div>
          ${entry ? `
            <div class="cal-name">${escapeHtml(entry.name||'')}</div>
            ${entry.participants && entry.participants.length ? `<div class="cal-people">${entry.participants.map(p=>escapeHtml(p)).join(', ')}</div>` : ''}
          ` : ''}
        </div>`;
      }).join('')}
    </div>
    <div class="cal-legend">
      ${Object.entries(LITURGICAL_COLORS).map(([k,v])=>`<span class="legend-item"><span class="tag-color" style="background:${v.hex}"></span>${v.label}</span>`).join('')}
    </div>
  `;

  el.innerHTML = `
    <div class="card">
      <h3>복사단 일정표</h3>
      <div class="row" style="align-items:center;">
        <button class="btn small secondary" id="prevMonthBtn" type="button">‹ 이전달</button>
        <select id="yearSelSched" style="max-width:100px;">
          ${Array.from({length:5},(_,i)=>year-2+i).map(y=>`<option value="${y}" ${y===year?'selected':''}>${y}년</option>`).join('')}
        </select>
        <select id="monthSelSched" style="max-width:90px;">
          ${monthNames.map((n,i)=>`<option value="${i+1}" ${i+1===month?'selected':''}>${n}</option>`).join('')}
        </select>
        <button class="btn small secondary" id="nextMonthBtn" type="button">다음달 ›</button>
      </div>
      ${calHtml}
      <p class="muted" style="margin-top:10px;">날짜 칸을 누르면 그 날의 일정을 ${admin?'추가/수정':'확인'}할 수 있어요.</p>
      ${admin ? `
      <hr style="border:none;border-top:1px solid var(--line); margin:16px 0;">
      <div class="row">
        <button class="btn small" id="autoFillBtn">이 달 전례력 자동 불러오기</button>
      </div>
      <p class="muted" id="autoStatus" style="margin-top:6px;"></p>
      <div class="row" style="margin-top:8px;">
        <button class="btn secondary small" id="schedTemplateBtn" type="button">샘플 양식 다운로드</button>
        <button class="btn secondary small" id="schedImportBtn" type="button">📁 파일로 일괄 등록</button>
      </div>
      <input type="file" id="schedFileInput" accept=".xlsx,.xls,.csv" style="display:none">
      <p class="muted" id="schedImportStatus" style="margin-top:6px;"></p>` : ''}
    </div>
  `;
  document.getElementById('yearSelSched').onchange = (e) => { scheduleSelectedYear = parseInt(e.target.value,10); renderSchedule(); };
  document.getElementById('monthSelSched').onchange = (e) => { scheduleSelectedMonth = parseInt(e.target.value,10); renderSchedule(); };
  document.getElementById('prevMonthBtn').onclick = () => {
    scheduleSelectedMonth--; if (scheduleSelectedMonth<1){ scheduleSelectedMonth=12; scheduleSelectedYear--; }
    renderSchedule();
  };
  document.getElementById('nextMonthBtn').onclick = () => {
    scheduleSelectedMonth++; if (scheduleSelectedMonth>12){ scheduleSelectedMonth=1; scheduleSelectedYear++; }
    renderSchedule();
  };
  if (admin) {
    document.getElementById('autoFillBtn').onclick = () => autoFillMonth(scheduleSelectedMonth);
    document.getElementById('schedTemplateBtn').onclick = downloadScheduleTemplate;
    document.getElementById('schedImportBtn').onclick = () => document.getElementById('schedFileInput').click();
    document.getElementById('schedFileInput').onchange = importScheduleFile;
  }
}

function downloadScheduleTemplate(){
  const wb = XLSX.utils.book_new();
  const data = [
    ['날짜','요일','전례력','전례색','참여복사'],
    ['7.13','월','','','홍길동, 김철수'],
    ['7.20','월','연중 제16주일','녹','이영희, 박민수']
  ];
  const ws = XLSX.utils.aoa_to_sheet(data);
  XLSX.utils.book_append_sheet(wb, ws, '일정표');
  XLSX.writeFile(wb, '복사단_일정표_양식.xlsx');
}
async function importScheduleFile(e){
  const file = e.target.files[0];
  if (!file) return;
  const statusEl = document.getElementById('schedImportStatus');
  try {
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, {type:'array'});
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
    if (!rows.length) { alert('파일에서 데이터를 찾을 수 없습니다. 샘플 양식을 참고해주세요.'); return; }
    const year = scheduleSelectedYear;
    let sched = await collGetAll('schedule');
    let added=0, updated=0, autoFetched=0;
    for (let i=0;i<rows.length;i++){
      const r = rows[i];
      const dateRaw = String(r['날짜']||'').trim();
      if (!dateRaw) continue;
      const parts = dateRaw.split(/[.\/]/).map(x=>parseInt(x,10));
      if (parts.length<2 || isNaN(parts[0]) || isNaN(parts[1])) continue;
      const month = parts[0], day = parts[1];
      const dateLabel = `${month}.${String(day).padStart(2,'0')}`;
      const dateObj = new Date(year, month-1, day);
      let name = String(r['전례력']||'').trim();
      let color = String(r['전례색']||'').trim();
      if (!name) {
        if (statusEl) statusEl.textContent = `전례력 자동조회 중... (${i+1}/${rows.length})`;
        const info = await fetchLiturgyForDate(dateObj);
        if (info && info.name) { name = info.name; color = color || (info.color||''); autoFetched++; }
      }
      const participants = String(r['참여복사']||'').split(/[,、\s]+/).map(x=>x.trim()).filter(Boolean);
      const weekday = String(r['요일']||'').trim() || WEEKDAY_KR[dateObj.getDay()];
      const existing = sched.find(s => s.dateLabel===dateLabel && String(s.year)===String(year));
      const rec = { id: existing?.id || uid(), year, month, day, dateLabel, weekday, name, color, participants, sortKey: year*10000+month*100+day };
      if (existing) { const idx=sched.findIndex(s=>s.id===existing.id); sched[idx]=rec; updated++; } else { sched.push(rec); added++; }
    }
    await collSetAll('schedule', sched);
    if (statusEl) statusEl.textContent = `완료: ${added}건 추가, ${updated}건 갱신${autoFetched?`, 전례력 ${autoFetched}건 자동조회`:''}`;
  } catch(err) {
    alert('파일을 읽는 중 오류가 발생했습니다: ' + err.message);
  } finally {
    e.target.value = '';
    renderSchedule();
  }
}

window.deleteSchedule = async (id) => { if(!isAdmin()) return; if (!confirm('삭제할까요?')) return; const sched = await collGetAll('schedule'); await collSetAll('schedule', sched.filter(s=>s.id!==id)); renderSchedule(); };

async function autoFillMonth(month){
  const statusEl = document.getElementById('autoStatus');
  const year = scheduleSelectedYear;
  const daysInMonth = new Date(year, month, 0).getDate();
  let sched = await collGetAll('schedule');
  let added = 0, failed = 0;
  for (let d=1; d<=daysInMonth; d++){
    statusEl.innerHTML = `<span class="spin"></span> ${month}월 전례력 불러오는 중... (${d}/${daysInMonth})`;
    const dateObj = new Date(year, month-1, d);
    const info = await fetchLiturgyForDate(dateObj);
    if (!info || !info.name) { failed++; continue; }
    const dateLabel = `${month}.${String(d).padStart(2,'0')}`;
    const existing = sched.find(s => s.dateLabel===dateLabel && String(s.year)===String(year));
    const rec = {
      id: existing?.id || uid(),
      year, month, day:d, dateLabel,
      weekday: WEEKDAY_KR[dateObj.getDay()],
      name: info.name, color: info.color || '',
      participants: existing?.participants || [],
      sortKey: year*10000 + month*100 + d
    };
    if (existing) { const idx = sched.findIndex(s=>s.id===existing.id); sched[idx]=rec; } else { sched.push(rec); }
    added++;
  }
  await collSetAll('schedule', sched);
  statusEl.textContent = `완료: ${added}일 반영${failed?`, ${failed}일 조회 실패`:''} (참여 복사는 각 날짜를 수정해서 입력해주세요)`;
  renderSchedule();
}

/* ---------- 실시간 공유 (Firestore onSnapshot) ---------- */
function isModalOpen(){ const m = document.getElementById('modal'); return m && m.open; }
let realtimeStarted = false;
function setupRealtimeSync(){
  if (!useFirebase || realtimeStarted) return;
  realtimeStarted = true;
  let firstMembers = true, firstSchedule = true, firstMeetings = true, firstConfig = true, firstRules = true, firstPrayers = true;
  db.collection('members').onSnapshot(() => {
    if (firstMembers) { firstMembers = false; return; }
    if (!isModalOpen()) render(currentTab);
  });
  db.collection('schedule').onSnapshot(() => {
    if (firstSchedule) { firstSchedule = false; return; }
    if (!isModalOpen()) render(currentTab);
  });
  db.collection('meetings').onSnapshot(() => {
    if (firstMeetings) { firstMeetings = false; return; }
    if (!isModalOpen()) render(currentTab);
  });
  db.doc('config/main').onSnapshot(() => {
    if (firstConfig) { firstConfig = false; return; }
    updateHeader();
    if (!isModalOpen()) render(currentTab);
  });
  db.doc('rules/main').onSnapshot(() => {
    if (firstRules) { firstRules = false; return; }
    if (!isModalOpen() && currentTab === 'rules') render(currentTab);
  });
  db.doc('prayers/main').onSnapshot(() => {
    if (firstPrayers) { firstPrayers = false; return; }
    if (!isModalOpen() && currentTab === 'prayers') render(currentTab);
  });
}

updateHeader();
updateAdminBtn();
registerSW();
setupRealtimeSync();
render('home');
</script>
</body>
</html>
